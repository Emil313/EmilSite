<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая заявка - Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Корочки.<span>есть</span></a>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
                <h2 class="card-title text-center mb-4">Новая заявка</h2>
                <form id="newApplicationForm">
                    <div class="mb-3">
                        <label class="form-label">Наименование курса</label>
                        <input type="text" class="form-control" id="courseName" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Желаемая дата начала</label>
                        <input type="date" class="form-control" id="startDate" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Способ оплаты</label>
                        <select class="form-select" id="paymentMethod" required>
                            <option value="cash">Наличными</option>
                            <option value="transfer">Перевод по номеру телефона</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Отправить</button>

                    <p class="text-center mt-3">
                        <a href="applications.html" class="text-primary">Назад к заявкам</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
